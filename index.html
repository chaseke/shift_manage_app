<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Shift management</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>
<body>
    <div id="sidebar" class="sidebar collapsed">
        <div class="sidebar-header">
            <button onclick="toggleSidebar()" class="close-sidebar-btn" title="閉じる">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <button class="nav-btn active" onclick="switchPage('shift')"><span class="material-symbols-outlined">calendar_month</span> シフト管理</button>
        <button class="nav-btn" onclick="switchPage('regular')"><span class="material-symbols-outlined">settings</span> レギュラー授業</button>
        <button class="nav-btn" onclick="switchPage('wage')"><span class="material-symbols-outlined">payments</span> 時給登録</button>
    </div>

    <div class="main-content">
        <button onclick="toggleSidebar()" class="open-sidebar-btn" title="メニューを開く">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <div id="page-shift" class="page active">
            <div class="header-controls">
                <select id="select-year" onchange="initCalendar()"></select> 年
                <select id="select-month" onchange="initCalendar()"></select> 月度

                <span id="date-range-label" class="date-range-badge"></span>

                <button class="calc-income-btn" style="background-color: #17a2b8;" onclick="applyRegularShifts()">
                    <span class="material-symbols-outlined">event_repeat</span> レギュラー一括反映
                </button>
                
                <button class="calc-income-btn" onclick="showExpectedIncome()">
                    <span class="material-symbols-outlined">double_arrow</span> 予想収入を計算
                </button>
            </div>
            
            <div class="calendar-header">
                <div class="weekday-header">日</div><div class="weekday-header">月</div>
                <div class="weekday-header">火</div><div class="weekday-header">水</div>
                <div class="weekday-header">木</div><div class="weekday-header">金</div>
                <div class="weekday-header">土</div>
            </div>
            
            <div class="calendar-grid" id="calendar"></div>

            <div id="total-banner" class="total-area">
                総合計時間: <span id="grand-total-hours">0</span> 時間 <span id="grand-total-mins">0</span> 分
            </div>
            <div id="warning-msg" class="warning-popup">
                <span class="material-symbols-outlined">warning</span> 合計勤務時間が80時間を超えています
            </div>
        </div>

        <div id="page-regular" class="page">
            <h3>曜日ごとのレギュラー登録</h3>
            <div class="regular-list" id="regular-container"></div>
            <button class="btn-apply" onclick="applyRegularShifts()"><span class="material-symbols-outlined">check_circle</span> カレンダーに一括反映</button>
        </div>

        <div id="page-wage" class="page">
            <h3>時給・交通費設定</h3>
            <div class="wage-container">
                <div class="wage-row">
                    <label>事務時間 </label>
                    <input type="number" id="wage-admin" value="1100"> 円
                </div>
                <div class="wage-row">
                    <label>小中学生 </label>
                    <input type="number" id="wage-jrhigh" value="1300"> 円
                </div>
                <div class="wage-row">
                    <label>高校生 </label>
                    <input type="number" id="wage-high" value="1460"> 円
                </div>
                <div class="wage-row">
                    <label>チューター </label>
                    <input type="number" id="wage-tutor" value="1200"> 円
                </div>
                <hr>
                <div class="wage-row">
                    <label>1日あたりの交通費 </label>
                    <input type="number" id="wage-transport" value="0"> 円
                </div>
                <button class="btn-apply" onclick="saveWageSettings()"><span class="material-symbols-outlined">save</span> 設定を保存</button>
            </div>
        </div>
    </div>

    <div id="detail-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">詳細設定</h3>
            <div class="modal-row">
                <span>チューター (コマ)</span>
                <div>
                    <button class="btn-circle" onclick="changeModalTutor(-1)">-</button>
                    <span id="modal-tutor-count" class="count-display">0</span>
                    <button class="btn-circle" onclick="changeModalTutor(1)">+</button>
                </div>
            </div>
            <div class="modal-row">
                <span>手動調整 (分)</span>
                <input type="number" id="modal-adjust" class="input-adjust" onchange="changeModalAdjust(this.value)">
            </div>
            <hr>
            <div class="modal-row">
                <span>高校生のコマ数<br><small>(総コマ数内での割合)</small></span>
                <div>
                    <button class="btn-circle" onclick="changeModalHighSchool(-1)">-</button>
                    <span id="modal-hs-count" class="count-display">0</span>
                    <button class="btn-circle" onclick="changeModalHighSchool(1)">+</button>
                </div>
            </div>
            <button class="btn-close" onclick="closeModal()">決定して閉じる</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
